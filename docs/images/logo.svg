<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="UserAdminModule — terminal logo">
  <!-- Terminal window outer frame -->
  <rect x="2" y="2" width="60" height="60" rx="8" ry="8"
        fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="2" y="2" width="60" height="16" rx="8" ry="8"
        fill="#1c2128"/>
  <!-- Square off the bottom corners of the title bar -->
  <rect x="2" y="10" width="60" height="8"
        fill="#1c2128"/>

  <!-- Title bar divider -->
  <line x1="2" y1="18" x2="62" y2="18" stroke="#30363d" stroke-width="1"/>

  <!-- Window control dots -->
  <circle cx="12" cy="11" r="3" fill="#ff5f57"/>
  <circle cx="22" cy="11" r="3" fill="#ffbd2e"/>
  <circle cx="32" cy="11" r="3" fill="#28c840"/>

  <!-- PS> prompt text -->
  <text x="7" y="38"
        font-family="'Cascadia Code','Cascadia Mono',Consolas,'SFMono-Regular',monospace"
        font-size="13"
        font-weight="600"
        fill="#58a6ff">PS&gt;</text>

  <!-- Blinking cursor block (static in SVG) -->
  <rect x="37" y="27" width="7" height="11" rx="1" fill="#3fb950" opacity="0.9"/>

  <!-- Second line — muted underline suggests more content -->
  <rect x="7" y="46" width="28" height="2" rx="1" fill="#30363d"/>
  <rect x="7" y="52" width="18" height="2" rx="1" fill="#30363d"/>
</svg>
