<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="UserAdminModule favicon">
  <!-- Terminal window outer frame -->
  <rect x="1" y="1" width="30" height="30" rx="5" ry="5"
        fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="1" y="1" width="30" height="9" rx="5" ry="5"
        fill="#1c2128"/>
  <!-- Square off bottom corners of title bar -->
  <rect x="1" y="6" width="30" height="4"
        fill="#1c2128"/>

  <!-- Title bar divider -->
  <line x1="1" y1="10" x2="31" y2="10" stroke="#30363d" stroke-width="1"/>

  <!-- Window control dots (simplified) -->
  <circle cx="6"  cy="6" r="2" fill="#ff5f57"/>
  <circle cx="12" cy="6" r="2" fill="#ffbd2e"/>
  <circle cx="18" cy="6" r="2" fill="#28c840"/>

  <!-- PS> prompt text -->
  <text x="3" y="22"
        font-family="'Cascadia Code','Cascadia Mono',Consolas,'SFMono-Regular',monospace"
        font-size="8"
        font-weight="700"
        fill="#58a6ff">PS&gt;</text>

  <!-- Cursor block -->
  <rect x="21" y="15" width="5" height="7" rx="1" fill="#3fb950" opacity="0.9"/>

  <!-- Bottom muted lines -->
  <rect x="3" y="26" width="14" height="1.5" rx="1" fill="#30363d"/>
</svg>
