title: UserAdminModule
description: >
  Stop dot-sourcing. Start managing. A PowerShell function management
  framework that gives any administrator a superpower in their own shell.

baseurl: ""
url: "https://useradminmodule.lukeleigh.com"

remote_theme: mmistakes/minimal-mistakes@4.17.2
minimal_mistakes_skin: dark

name: "UserAdminModule"
subtitle: "Stop dot-sourcing. Start managing. A PowerShell module framework that makes administrator functions discoverable."

logo: "/assets/images/PowerShell_5.0_icon88x88.png"
author:
  name: "Luke Leigh"
  avatar: "/assets/images/bio-photo.jpg"
  bio: "PowerShell Developer / Infrastructure Engineer"
  location: "Essex, UK"
  email: "me@lukeleigh.com"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/BanterBoy"
    - label: "PSGallery"
      icon: "fas fa-fw fa-boxes"
      url: "https://www.powershellgallery.com/packages/UserAdminModule"
    - label: "Scripts Blog"
      icon: "fas fa-fw fa-laptop-code"
      url: "http://scripts.lukeleigh.com/"

github_username: "BanterBoy"
repository: "BanterBoy/UserAdminModule"

navigation:
  - title: "Home"
    url: "/"
  - title: "Getting Started"
    url: "/getting-started/"
  - title: "Bring Your Own Functions"
    url: "/your-functions/"
  - title: "Framework Reference"
    url: "/reference/"
  - title: "Build Your Function Library"
    url: "/getting-functions/"

search: true
breadcrumbs: true

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/BanterBoy/UserAdminModule"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "edit"

plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - vendor

include:
  - _pages

# Reading Files
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Site Author
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/BanterBoy"
    - label: "PSGallery"
      icon: "fas fa-fw fa-boxes"
      url: "https://www.powershellgallery.com/packages/UserAdminModule"
    - label: "Scripts Blog"
      icon: "fas fa-fw fa-laptop-code"
      url: "http://scripts.lukeleigh.com/"

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Collections
collections:
  docs:
    output: true
    permalink: /:collection/:path/

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: GB

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
