title: UserAdminModule
description: >
  Stop dot-sourcing. Start managing. A PowerShell function management
  framework that gives any administrator a superpower in their own shell.

baseurl: ""
url: "https://useradminmodule.lukeleigh.com"

remote_theme: just-the-docs/just-the-docs@v0.10.0
color_scheme: dark

nav_sort: order
search_enabled: true

# Top-right navigation links
aux_links:
  "GitHub":
    - "https://github.com/BanterBoy/UserAdminModule"
  "PSGallery":
    - "https://www.powershellgallery.com/packages/UserAdminModule"
aux_links_new_tab: true

# Footer
footer_content: >
  &copy; 2026 Luke Leigh &mdash; Published on the
  <a href="https://www.powershellgallery.com/packages/UserAdminModule">PowerShell Gallery</a>.
  Source on <a href="https://github.com/BanterBoy/UserAdminModule">GitHub</a>.

# Edit on GitHub
gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/BanterBoy/UserAdminModule"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "edit"

# Callouts
callouts_level: quiet
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: yellow
  important:
    title: Important
    color: red

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
